<!DOCTYPE html>
<html lang="ps" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>د محمدي مدرسې د زده کونکو د څلور میاشتینۍ آزموینې پایله</title>
  
  <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jomhuria&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  
  <style>
    /* ──────────────────────────────────────────────────────────
       بخش اول: مرکز کنترل رنگ‌ها و متغیرهای اصلی قالب
       ────────────────────────────────────────────────────────── */
    :root {
      --primary-color: #06261f;     /* رنگ اصلی: سبز تیره اسلامی */
      --secondary-color: #06261f;   
      --accent-color: #c2991b;      /* رنگ تاکید: طلایی درخشان */
      --bg-color: #edf2ee;          /* پس‌زمینه کل صفحه */
      --card-bg: #ffffff;           /* پس‌زمینه باکس اصلی */
      --text-color: #1a252f;        
      --important-row-bg: #0f3d59;  /* رنگ ردیف‌های ۵ و ۶ از آخر (آبی شاهانه) */
      --btn-danger-bg: #a91e1e;     /* رنگ دکمه خروج */
      --error-bg-color: #d32f2f;    
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Vazirmatn', sans-serif; 
      background-color: var(--bg-color);   
      min-height: 100vh;                   
      display: flex;                       
      justify-content: center;             
      align-items: center;                 
      padding: 25px;                       
      background-image: radial-gradient(rgba(194, 153, 27, 0.15) 1px, transparent 1px), 
                        radial-gradient(rgba(194, 153, 27, 0.15) 1px, var(--bg-color) 1px);
      background-size: 24px 24px;          
      background-position: 0 0, 12px 12px;
    }

    /* ──────────────────────────────────────────────────────────
       بخش دوم: چوکات هوشمند (افزایش عرض به 21 پیکسل در کامپیوتر)
       ────────────────────────────────────────────────────────── */
    .container {
      width: 100%;
      max-width: 2100px;                    /* عرض چوکات کامپیوتر برای افقی‌تر شدن بیشتر شد */
      background: var(--card-bg);          
      border-radius: 30px;                 
      box-shadow: 
        0 10px 30px rgba(6, 38, 31, 0.05),
        0 30px 70px rgba(6, 38, 31, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.6);
      
      border-top: 30px solid var(--primary-color);
      border-bottom: 30px solid var(--primary-color);
      border-right: 6px solid var(--accent-color);
      border-left: 6px solid var(--accent-color);
      
      outline: 2px solid var(--primary-color);
      outline-offset: -8px;                
      padding: 15px 40px 30px 40px;                  
      transition: all 0.4s ease;           
    }

    /* ──────────────────────────────────────────────────────────
       بخش سوم: جدول هدر و تنظیمات انیمیشن ماشین‌تحریر (Typewriter)
       ────────────────────────────────────────────────────────── */
    .header-layout-table {
      width: 100%;
      border-collapse: collapse;
      margin: 10px 0;                 
    }

    .header-layout-table td {
      border: none !important;             
      background: transparent !important;   
      padding: 0 !important;               
      vertical-align: middle !important;   
    }

    .slogan-box {
      width: 36%;                          /* عرض چوکات شعارها برای فضای بیشتر */
      padding: 10px 15px !important;
      background: linear-gradient(135deg, #ffffff, #f4f7f5) !important; 
      border: 4px double var(--accent-color) !important; 
      border-radius: 12px;                  
      font-family: 'Amiri', serif;         
      font-size: 38px;                     /* اندازه فونت کاملاً استاندارد برای جا شدن در یک خط دسکتاپ */
      font-weight: 700;                    
      color: var(--primary-color);         
      line-height: 1.3 !important;         
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(6, 38, 31, 0.05);
      
      /* فیکس کردن جایگاه چوکات‌ها دقیقاً در وسط و با فاصله‌های کاملاً مساوی */
      height: 140px;                       
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      vertical-align: middle;
      direction: rtl;                      /* تنظیم جهت از راست به چپ */
    }

    /* کانتینر متن شعار */
    .typewriter-text {
      display: inline-block;
      white-space: nowrap;                 /* در کامپیوتر اجباراً در یک خط می‌ماند */
      width: 100%;
      text-align: center;
      direction: rtl;
      opacity: 0;
      /* انیمیشن ظهور لوکس و منظم حرف به حرف از راست به چپ با ۵ ثانیه مکث */
      animation: smoothShow 8s ease-in-out infinite;
    }

    /* ایجاد تاخیر کوچک برای شعار سمت چپ جهت جذابیت بیشتر */
    .slogan-left .typewriter-text {
      animation-delay: 0.5s;
    }

    /* انیمیشن ظهور متن: تایپ/ظهور نرم در ۳ ثانیه + ۵ ثانیه مکث کامل */
    @keyframes smoothShow {
      0% { opacity: 0; transform: translateX(15px); filter: blur(5px); }
      35%, 85% { opacity: 1; transform: translateX(0); filter: blur(0); } /* نمایش کامل و مکث ۵ ثانیه‌ای */
      100% { opacity: 0; transform: translateX(-15px); filter: blur(5px); }
    }

    /* تنظیم فیکس کادر لوگوی وسط برای تقسیم مساوی فاصله‌ها */
    .logo-center-container {
      width: 28%;                          
      text-align: center;
      vertical-align: middle;
    }

    /* ──────────────────────────────────────────────────────────
       تنظیمات مخصوص موبایل: تغییر به دو خط و نمایش کامل
       ────────────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      /* در موبایل اگر خواستید شعارها نشان داده شوند، کد زیر آن‌ها را فعال و دو خطه می‌کند */
      .slogan-box { 
        display: inline-flex !important;   /* فعال کردن در موبایل */
        width: 100% !important; 
        height: auto !important;
        font-size: 24px !important; 
        margin-bottom: 10px;
      }
      .typewriter-text { 
        white-space: normal !important;    /* شکستن متن در دو خط برای موبایل */
        word-wrap: break-word !important;
      }
      
      /* اگر می‌خواهید کماکان در موبایل مخفی باشند تا هدر خلوت باشد، این دو خط زیر را فعال نگه دارید: */
      .slogan-box { display: none !important; } 
      .logo-center-container { width: 100% !important; }
    }

    .logo-img {
      width: 220px;                        
      height: 220px;                       
      object-fit: contain;                 
      filter: drop-shadow(0 8px 16px rgba(6, 38, 31, 0.18)); 
    }

    /* کادر رنگی عنوان اصلی */
    .header-table-box {
      width: 100%;
      margin: 0 0 30px 0;                  
      background: linear-gradient(135deg, var(--primary-color), #031411); 
      border: 4px double var(--accent-color); 
      border-radius: 14px;                 
      padding: 20px;                  
      text-align: center;                  
    }

    .header-table-box h2 {
      font-family: 'Jomhuria', serif;
      color: var(--accent-color);          
      margin: 0;
      font-size: 55px;                     
      font-weight: 400;
      line-height: 1.1;
    }

    .header-table-box .sub-title {
      color: #ffffff;                      
      font-size: 16px;                     
      font-weight: 600;
      margin-top: 8px;
    }

    /* ──────────────────────────────────────────────────────────
       بخش چهارم: فرم ورودی‌ها و کادر جستجو
       ────────────────────────────────────────────────────────── */
    #searchPage {
      display: block;                      
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 25px;                           
      margin-bottom: 25px;
      background: #f7f9f7;                 
      padding: 35px; 
      border-radius: 16px;
      border: 2px solid #dce5df;           
    }

    .input-box {
      display: flex;
      flex-direction: column;
    }

    label {
      font-size: 22px;                     
      font-weight: 800;
      color: var(--primary-color);
      margin-bottom: 10px;                 
    }

    input {
      padding: 16px 20px;                  
      border: 3px solid #b2c4ba;           
      border-radius: 12px;                 
      font-family: 'Vazirmatn', sans-serif;
      font-size: 22px;                     
      outline: none;
      text-align: center;                  
      background-color: #ffffff;
      color: var(--primary-color);
      font-weight: 700;
      transition: all 0.3s ease;
    }

    input:focus {
      border-color: var(--accent-color);    
      box-shadow: 0 0 12px rgba(194, 153, 27, 0.25); 
    }

    .hint-text {
      font-size: 14px;
      color: #5c6a62;
      margin-top: 6px;
      font-weight: 700;
      text-align: center;
    }

    .btn-search {
      width: 100%;
      padding: 20px;
      background: linear-gradient(135deg, var(--primary-color), #0b4237); 
      color: white;                        
      border: 2px solid var(--accent-color); 
      border-radius: 12px;
      font-family: 'Vazirmatn', sans-serif;
      font-size: 24px; 
      font-weight: 800;
      cursor: pointer;                     
      box-shadow: 0 6px 15px rgba(6, 38, 31, 0.2);
      margin-top: 10px;
      transition: all 0.2s ease;
    }

    .btn-search:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(6, 38, 31, 0.3);
    }

    .btn-clear-wrapper {
      display: flex;
      justify-content: center;             
      width: 100%;
      margin-top: 5px;
    }

    .btn-clear {
      padding: 10px 20px;                  
      background: #e5e9e6;                 
      color: #a91e1e;                      
      border: 2px solid #b2c4ba;
      border-radius: 10px;
      font-family: 'Vazirmatn', sans-serif;
      font-size: 16px;                     
      font-weight: 800;
      cursor: pointer;
    }

    /* ──────────────────────────────────────────────────────────
       بخش پنجم: انیمیشن لودینگ و کادر خطا
       ────────────────────────────────────────────────────────── */
    #loading {
      display: none;                       
      text-align: center;
      margin: 20px 0;
      color: var(--primary-color);         
      font-weight: 900;
      font-size: 22px;
    }

    .animated-dots span {
      display: inline-block;
      animation: realTimeDots 1.4s infinite both;       
      font-size: 26px;                     
    }

    @keyframes realTimeDots {
      0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; }
    }

    #error-msg {
      display: none;
      background-color: var(--error-bg-color); 
      color: #ffffff;           
      padding: 18px;
      border-radius: 12px;
      margin-bottom: 20px;
      text-align: center;                  
      border: 2.5px solid var(--accent-color); 
      font-weight: 800;
      font-size: 20px;                     
    }

    /* ──────────────────────────────────────────────────────────
       بخش ششم: افکت‌های کلیک، حرکت ماوس و انیمیشن جدول دوقلو
       ────────────────────────────────────────────────────────── */
    #resultPage {
      display: none;                       
    }

    .table-title {
      color: var(--primary-color);
      font-size: 24px;
      font-weight: 900;
      margin-bottom: 20px;
      border-bottom: 3px solid var(--accent-color); 
      padding-bottom: 8px;
      display: inline-block;
    }

    .luxury-table {
      width: 100%;
      border-collapse: separate;           
      border-spacing: 0 10px;              
      margin-bottom: 30px;
    }

    .luxury-table tr {
      transition: all 0.25s cubic-bezier(0.25, 0.8, 0.25, 1);
      cursor: pointer;
    }

    .luxury-table tr:nth-child(even) td { background-color: #f5f8f6; } 
    .luxury-table tr:nth-child(odd) td { background-color: #eaf0ec; }  

    .luxury-table tr td:first-child {
      border-top-right-radius: 12px;
      border-bottom-right-radius: 12px;
      border-right: 2px solid #cedbd3;
    }

    .luxury-table tr td:last-child {
      border-top-left-radius: 12px;
      border-bottom-left-radius: 12px;
      border-left: 2px solid #cedbd3;
    }

    /* افکت حرکت ماوس (Hover) */
    .luxury-table tr:hover td {
      background-color: #F0EAD6 !important; 
      color: #000000 !important;           
    }

    /* استایل ردیف‌های ۵ و ۶ از آخر (آبی شاهانه) */
    .luxury-table tr:nth-last-child(5) td,
    .luxury-table tr:nth-last-child(6) td {
      background-color: var(--important-row-bg) !important; 
      color: #ffffff !important;           
      border-top: 1.5px dashed var(--accent-color);  
      border-bottom: 1.5px dashed var(--accent-color);
    }
    
    .luxury-table tr:nth-last-child(5) td:first-child,
    .luxury-table tr:nth-last-child(6) td:first-child {
      border-right: 3px solid var(--accent-color) !important; 
    }

    .luxury-table tr:nth-last-child(5) td:last-child,
    .luxury-table tr:nth-last-child(6) td:last-child {
      border-left: 3px solid var(--accent-color) !important;  
    }

    /* افکت فوق‌العاده کلیک و لمس روی ردیف‌ها */
    .luxury-table tr:active td,
    .luxury-table tr.selected-row td {
      background-color: #543717 !important; 
      color: #ffffff !important;           
      border-top: 3px solid var(--accent-color) !important;  
      border-bottom: 3px solid var(--accent-color) !important;
    }

    .luxury-table tr:active td:first-child,
    .luxury-table tr.selected-row td:first-child {
      border-right: 4px solid var(--accent-color) !important;
    }

    .luxury-table tr:active td:last-child,
    .luxury-table tr.selected-row td:last-child {
      border-left: 4px solid var(--accent-color) !important;
    }

    .luxury-table tr:active,
    .luxury-table tr.selected-row {
      box-shadow: 0 8px 20px rgba(84, 55, 23, 0.35), 0 0 12px rgba(194, 153, 27, 0.6);
      transform: scale(1.015);              
    }

    .luxury-table td {
      padding: 16px 12px !important;       
      font-family: 'Vazirmatn', sans-serif !important;
      font-size: 24px !important;          
      font-weight: 700 !important; 
      border-top: 1px solid #cedbd3;
      border-bottom: 1px solid #cedbd3;
      text-align: center !important;       
      transition: all 0.2s ease;
    }

    .td-header {
      background-color: var(--primary-color) !important; 
      color: #ffffff !important;           
      width: 50%;                          
    }

    .luxury-table tr:active .td-header,
    .luxury-table tr.selected-row .td-header {
      background-color: #543717 !important;
    }

    .luxury-table tr:nth-last-child(5) .td-header,
    .luxury-table tr:nth-last-child(6) .td-header {
      background-color: #0b2e45 !important; 
    }

    .td-value {
      color: #031411;                      
      font-weight: 700 !important; 
    }

    .btn-back {
      width: 100%;
      padding: 18px;                       
      background: linear-gradient(135deg, var(--btn-danger-bg), #7f1414); 
      color: #ffffff !important;           
      border: 2px solid var(--accent-color); 
      border-radius: 12px;                
      font-family: 'Vazirmatn', sans-serif;
      font-size: 20px;                     
      font-weight: 800;
      cursor: pointer;
    }

    /* ──────────────────────────────────────────────────────────
       بخش هفتم: بهینه‌سازی کامل نسخه موبایل (تغییر ساختار به عمودی)
       ────────────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      body { padding: 0; align-items: flex-start; }

      .container {
        margin: 0;
        width: 100%;
        max-width: 100%;
        min-height: 100vh;                 
        border-radius: 0;                  
        border-top: 20px solid var(--primary-color);
        border-bottom: 20px solid var(--primary-color);
        border-right: 10px solid var(--accent-color); 
        border-left: 10px solid var(--accent-color);
        outline-offset: -5px;
        padding: 12px 15px;      
      }

      /* مخفی کردن شعارهای عریض در موبایل جهت جلوگیری از به هم ریختگی قالب */
      .slogan-box { display: none !important; }
      .logo-center-container { width: 100% !important; }

      .logo-img { width: 130px; height: 130px; }       
      .header-table-box { padding: 12px 10px; margin-bottom: 20px; }
      .header-table-box h2 { font-size: 34px; }        
      
      .form-group { padding: 20px 15px; gap: 15px; }
      label { font-size: 16px; }
      input { padding: 12px; font-size: 18px; }
      
      .btn-search, .btn-back, .btn-clear { padding: 14px; font-size: 18px; }
      .table-title { font-size: 16px; }
      
      .luxury-table td { padding: 12px 6px !important; font-size: 14px !important; } 
      #error-msg { font-size: 15px; padding: 12px; }
    }
  </style>
</head>
<body>

  <div class="container">
    
    <table class="header-layout-table">
      <tr>
        <td class="slogan-box slogan-right">
          <div class="typewriter-text">علم د مؤمن تر ټولو ستره شتمني ده</div>
        </td>
        
        <td class="logo-center-container">
          <img src="https://i.postimg.cc/HWVf6r64/mhmdy-mdrsh.png" alt="د محمدی مدرسې لوګو" class="logo-img">
        </td>
        
        <td class="slogan-box slogan-left">
          <div class="typewriter-text">د زده کوونکو بریا زموږ هیله ده</div>
        </td>
      </tr>
    </table>

    <div class="header-table-box">
      <h2>د محمدي مدرسې د زده کونکو د څلور میاشتینۍ آزموینې پایله</h2>
      <div class="sub-title">❖ د زده کوونکو د فعالیت او آزموینو نمرات په پوره دقت سره ورقړل شوي دي ❖</div>
    </div>

    <div id="error-msg"></div>

    <div id="searchPage">
      <div class="form-group">
        <div class="input-box">
          <label for="basisNum">د زده کونکي اساس شمیره:</label>
          <input type="text" id="basisNum" placeholder="مثلاً: 1234" onkeydown="handleBasisEnter(event)" required>
          <div class="hint-text">اساس شمېره په انګلیسي ژبه باندې ولیکئ</div>
        </div>
        <div class="input-box">
          <label for="studentCode">د زده کونکي پسورډ یا کوډ:</label>
          <input type="password" id="studentCode" placeholder="••••••" maxlength="6" onkeydown="handleCodeEnter(event)" required>
        </div>
      </div>

      <div class="btn-clear-wrapper">
        <button class="btn-clear" onclick="clearFormFields()">پاکول</button>
      </div>

      <button class="btn-search" onclick="getStudentInfo()">پلټنه او د نمراتو ښودل</button>
      
      <div id="loading">
        ❖ د معلوماتو د لټون په حال کې<span class="animated-dots"><span>.</span><span>.</span><span>.</span></span>
      </div>
    </div>

    <div id="resultPage">
      <div class="table-title">❖ د زده کونکي مشخصات او نمرات ❖</div>
      <table class="luxury-table" id="detailsTable">
      </table>
      <button class="btn-back" onclick="goBackToSearch()">له دې صفحې څخه وتل</button>
    </div>

  </div>

  <script>
    function handleBasisEnter(event) {
      if (event.key === 'Enter') {
        event.preventDefault(); 
        document.getElementById('studentCode').focus(); 
      }
    }

    function handleCodeEnter(event) {
      if (event.key === 'Enter') {
        event.preventDefault();
        getStudentInfo(); 
      }
    }

    // ریست فیلدها و مخفی‌سازی کادر خطا
    function clearFormFields() {
      document.getElementById('basisNum').value = '';
      document.getElementById('studentCode').value = '';
      document.getElementById('error-msg').style.display = 'none';
      document.getElementById('basisNum').focus(); 
    }

    function getStudentInfo() {
      var basisNum = document.getElementById('basisNum').value.trim();
      var studentCode = document.getElementById('studentCode').value.trim();
      
      var errorMsg = document.getElementById('error-msg');
      var loading = document.getElementById('loading');
      var searchPage = document.getElementById('searchPage');
      var resultPage = document.getElementById('resultPage');
      var table = document.getElementById('detailsTable');

      errorMsg.style.display = 'none';
      table.innerHTML = '';

      if (!basisNum || !studentCode) {
        errorMsg.innerText = 'هیله کیږي چې د زده کونکي اساس شمیره او کوډ دواړه دننه کړئ.';
        errorMsg.style.display = 'block';
        return;
      }

      loading.style.display = 'block';

      // اتصال کاملاً ایمن و بدون تغییر به لینک دیپلوی وب‌اپ شما
      var webAppUrl = "https://script.google.com/macros/s/AKfycbwfr53cS_A8nz7hEGEF5l3oc3m6dHO0ul0CIQumAMNKY4pJ1Qv19aYum0AsS3tvxB3LYw/exec";

      fetch(webAppUrl, {
        method: "POST",
        mode: "cors",
        headers: {
          "Content-Type": "text/plain;charset=utf-8"
        },
        body: JSON.stringify({
          basisNumber: basisNum,
          studentCode: studentCode
        })
      })
      .then(function(res) {
        return res.json();
      })
      .then(function(response) {
        loading.style.display = 'none'; 
        
        if (response.success) {
          searchPage.style.display = 'none';
          
          var tableHTML = '';
          response.data.forEach(function(item) {
            tableHTML += '<tr onclick="selectRow(this)">' +
                           '<td class="td-header">' + item.header + '</td>' + 
                           '<td class="td-value">' + item.value + '</td>' +   
                         '</tr>';
          });
          table.innerHTML = tableHTML; 
          resultPage.style.display = 'block'; 
        } else {
          errorMsg.innerText = response.message;
          errorMsg.style.display = 'block';
        }
      })
      .catch(function(err) {
        loading.style.display = 'none';
        errorMsg.innerText = 'له سرور سره په اړیکه کې ستونزه رامنځته شوه. بیا هڅه وکړئ.';
        errorMsg.style.display = 'block';
        console.error(err);
      }); 
    }

    // تابع مدیریت افکت فعال کلیک و تغییر کلاس رنگ ردیف انتخاب شده
    function selectRow(row) {
      var rows = document.querySelectorAll('.luxury-table tr');
      rows.forEach(function(r) {
        r.classList.remove('selected-row');
      });
      row.classList.add('selected-row');
    }

    function goBackToSearch() {
      document.getElementById('resultPage').style.display = 'none'; 
      document.getElementById('basisNum').value = '';              
      document.getElementById('studentCode').value = '';            
      document.getElementById('searchPage').style.display = 'block'; 
      document.getElementById('basisNum').focus();                  
    }
  </script>

</body>
</html>
