<!DOCTYPE html>
<html lang="ps" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>د محمدي مدرسې د زده کونکو د څلور میاشتینۍ آزموینې پایله</title>
  
  <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jomhuria&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  
  <style>
    /* ──────────────────────────────────────────────────────────
       بخش اول: مرکز کنترل رنگ‌ها و متغیرهای اصلی قالب
       ────────────────────────────────────────────────────────── */
    :root {
      --primary-color: #06261f;     /* رنگ اصلی: سبز تیره اسلامی */
      --secondary-color: #06261f;   
      --accent-color: #c2991b;      /* رنگ تاکید: طلایی درخشان */
      --bg-color: #edf2ee;          /* پس‌زمینه کل صفحه */
      --card-bg: #ffffff;           /* پس‌زمینه باکس اصلی */
      --text-color: #1a252f;        
      --important-row-bg: #0f3d59;  /* رنگ ردیف‌های ۵ و ۶ از آخر (آبی شاهانه) */
      --btn-danger-bg: #a91e1e;     /* رنگ دکمه خروج */
      --error-bg-color: #d32f2f;    
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Vazirmatn', sans-serif; 
      background-color: var(--bg-color);   
      min-height: 100vh;                   
      display: flex;                       
      justify-content: center;             
      align-items: center;                 
      padding: 12px;                       
      background-image: radial-gradient(rgba(194, 153, 27, 0.1) 1px, transparent 1px);
      background-size: 20px 20px;          
    }

    /* ──────────────────────────────────────────────────────────
       بخش دوم: چوکات و کانتینر اصلی (بهینه‌شده برای اپلیکیشن موبایل)
       ────────────────────────────────────────────────────────── */
    .container {
      width: 100%;
      max-width: 500px;                    /* محدود شده به اندازه استاندارد موبایل برای زیبایی بیشتر */
      background: var(--card-bg);          
      border-radius: 20px;                 
      box-shadow: 0 10px 25px rgba(6, 38, 31, 0.08);
      
      border-top: 15px solid var(--primary-color);
      border-bottom: 15px solid var(--primary-color);
      border-right: 5px solid var(--accent-color);
      border-left: 5px solid var(--accent-color);
      
      outline: 1.5px solid var(--primary-color);
      outline-offset: -5px;                
      padding: 15px 20px;                  
      transition: all 0.3s ease;           
    }

    /* ──────────────────────────────────────────────────────────
       بخش سوم: هدر و لوگو
       ────────────────────────────────────────────────────────── */
    .header-layout-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 10px;
    }

    .header-layout-table td {
      border: none !important;             
      background: transparent !important;   
      padding: 0 !important;               
      vertical-align: middle !important;   
    }

    .slogan-box {
      width: 25%;                          
      padding: 6px !important;
      border: 2px double var(--accent-color) !important; 
      border-radius: 6px;                  
      text-align: center;
      font-family: 'Amiri', serif;         
      font-size: 13px;                     /* کوچک شده برای موبایل */
      font-weight: 700;                    
      color: var(--primary-color);         
      line-height: 1.3 !important;
    }

    .logo-center-container {
      width: 50%;                          
      text-align: center;
    }

    .logo-img {
      width: 110px;                        /* اندازه مناسب و جمع‌وجور لوگو در موبایل */
      height: 110px;                       
      object-fit: contain;                 
      filter: drop-shadow(0 4px 8px rgba(6, 38, 31, 0.15)); 
    }

    /* باکس عنوان اصلی */
    .header-table-box {
      width: 100%;
      margin-bottom: 20px;
      background: linear-gradient(135deg, var(--primary-color), #031411); 
      border: 2.5px double var(--accent-color); 
      border-radius: 10px;                 
      padding: 10px 12px;                  
      text-align: center;                  
    }

    .header-table-box h2 {
      font-family: 'Jomhuria', serif;
      color: var(--accent-color);          
      margin: 0;
      font-size: 34px;                     /* فونت عنوان متناسب با عرض صفحه گوشی */
      font-weight: 400;
      line-height: 1.1;
    }

    .header-table-box .sub-title {
      color: #ffffff;                      
      font-size: 12px;                     /* ظریف و کوچک */
      font-weight: 600;
      margin-top: 5px;
    }

    /* ──────────────────────────────────────────────────────────
       بخش چهارم: فرم ورودی‌ها و دکمه‌ها
       ────────────────────────────────────────────────────────── */
    #searchPage {
      display: block;                      
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 15px;                           
      margin-bottom: 15px;
      background: #f7f9f7;                 
      padding: 15px; 
      border-radius: 12px;
      border: 1px solid #dce5df;           
    }

    .input-box {
      display: flex;
      flex-direction: column;
    }

    label {
      font-size: 15px;                     /* سایز حرفه‌ای و استاندارد لیبل */
      font-weight: 700;
      color: var(--primary-color);
      margin-bottom: 6px;                 
    }

    input {
      padding: 12px 15px;                  
      border: 2px solid #b2c4ba;           
      border-radius: 10px;                 
      font-family: 'Vazirmatn', sans-serif;
      font-size: 16px;                     /* اندازه استاندارد فونت کیبورد موبایل */
      outline: none;
      text-align: center;                  
      background-color: #ffffff;
      color: var(--primary-color);
      font-weight: 700;
    }

    input:focus {
      border-color: var(--accent-color);    
      box-shadow: 0 0 8px rgba(194, 153, 27, 0.2); 
    }

    .hint-text {
      font-size: 11px;
      color: #5c6a62;
      margin-top: 4px;
      text-align: center;
    }

    .btn-search {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--primary-color), #0b4237); 
      color: white;                        
      border: 1px solid var(--accent-color); 
      border-radius: 10px;
      font-family: 'Vazirmatn', sans-serif;
      font-size: 16px; 
      font-weight: 700;
      cursor: pointer;                     
      box-shadow: 0 4px 10px rgba(6, 38, 31, 0.15);
      margin-top: 10px;
    }

    .btn-clear-wrapper {
      display: flex;
      justify-content: center;             
      width: 100%;
    }

    .btn-clear {
      padding: 6px 15px;                  
      background: #e5e9e6;                 
      color: #a91e1e;                      
      border: 1px solid #b2c4ba;
      border-radius: 8px;
      font-family: 'Vazirmatn', sans-serif;
      font-size: 12px;                     
      font-weight: 700;
      cursor: pointer;
    }

    /* ──────────────────────────────────────────────────────────
       بخش پنجم: لودینگ و خطاها
       ────────────────────────────────────────────────────────── */
    #loading {
      display: none;                       
      text-align: center;
      margin: 15px 0;
      color: var(--primary-color);         
      font-weight: 700;
      font-size: 15px;
    }

    .animated-dots span {
      display: inline-block;
      animation: realTimeDots 1.4s infinite both;       
      font-size: 18px;                     
    }

    @keyframes realTimeDots {
      0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; }
    }

    #error-msg {
      display: none;
      background-color: var(--error-bg-color); 
      color: #ffffff;           
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 15px;
      text-align: center;                  
      border: 1.5px solid var(--accent-color); 
      font-weight: 700;
      font-size: 14px;                     
    }

    /* ──────────────────────────────────────────────────────────
       بخش ششم: جدول نتایج (کاملاً منظم و در سایز اپلیکیشن)
       ────────────────────────────────────────────────────────── */
    #resultPage {
      display: none;                       
    }

    .table-title {
      color: var(--primary-color);
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 15px;
      border-bottom: 2px solid var(--accent-color); 
      padding-bottom: 5px;
      display: inline-block;
    }

    .luxury-table {
      width: 100%;
      border-collapse: separate;           
      border-spacing: 0 6px;              /* فاصله ردیف‌ها کمتر شد تا شیک‌تر شود */
      margin-bottom: 20px;
    }

    .luxury-table tr:nth-child(even) td { background-color: #f8faf9; } 
    .luxury-table tr:nth-child(odd) td { background-color: #f1f5f2; }  

    .luxury-table tr td:first-child {
      border-top-right-radius: 8px;
      border-bottom-right-radius: 8px;
    }

    .luxury-table tr td:last-child {
      border-top-left-radius: 8px;
      border-bottom-left-radius: 8px;
    }

    /* ردیف‌های ۵ و ۶ از آخر (آبی شاهانه) */
    .luxury-table tr:nth-last-child(5) td,
    .luxury-table tr:nth-last-child(6) td {
      background-color: var(--important-row-bg) !important; 
      color: #ffffff !important;           
    }

    .luxury-table td {
      padding: 10px 8px !important;       /* پدینگ کوچک و منظم برای موبایل */
      font-family: 'Vazirmatn', sans-serif !important;
      font-size: 14px !important;          /* فونت کاملاً خوانا و اندازه استاندارد کارنامه */
      font-weight: 700 !important; 
      border-top: 1px solid #e2ece6;
      border-bottom: 1px solid #e2ece6;
      text-align: center !important;       
    }

    .td-header {
      background-color: var(--primary-color) !important; 
      color: #ffffff !important;           
      width: 50%;                          
    }

    .luxury-table tr:nth-last-child(5) .td-header,
    .luxury-table tr:nth-last-child(6) .td-header {
      background-color: #0b2e45 !important; 
    }

    .td-value {
      color: #031411;                      
      font-weight: 700 !important; 
    }

    .btn-back {
      width: 100%;
      padding: 14px;                       
      background: linear-gradient(135deg, var(--btn-danger-bg), #7f1414); 
      color: #ffffff !important;           
      border: 1.5px solid var(--accent-color); 
      border-radius: 10px;                
      font-family: 'Vazirmatn', sans-serif;
      font-size: 16px;                     
      font-weight: 700;
      cursor: pointer;
    }

    /* ──────────────────────────────────────────────────────────
       بخش هفتم: تنظیمات تکمیلی نمایشگرهای بسیار کوچک
       ────────────────────────────────────────────────────────── */
    @media (max-width: 360px) {
      .slogan-box { display: none !important; } /* حذف شعارها فقط در گوشی‌های بسیار کوچک قدیمی */
      .logo-center-container { width: 100% !important; }
      .header-table-box h2 { font-size: 28px; }
      .luxury-table td { font-size: 13px !important; padding: 8px 4px !important; }
    }
  </style>
</head>
<body>

  <div class="container">
    
    <table class="header-layout-table">
      <tr>
        <td class="slogan-box">علم د مؤمن تر ټولو ستره شتمني ده</td>
        <td class="logo-center-container">
          <img src="https://i.postimg.cc/HWVf6r64/mhmdy-mdrsh.png" alt="د محمدي مدرسې لوګو" class="logo-img">
        </td>
        <td class="slogan-box">د زده کوونکو بریا زموږ هیله ده</td>
      </tr>
    </table>

    <div class="header-table-box">
      <h2>د محمدي مدرسې د زده کونکو د څلور میاشتینۍ آزموینې پایله</h2>
      <div class="sub-title">❖ د زده کوونکو د نمراتو سیستم ❖</div>
    </div>

    <div id="error-msg"></div>

    <div id="searchPage">
      <div class="form-group">
        <div class="input-box">
          <label for="basisNum">د زده کونکي اساس شمیره:</label>
          <input type="text" id="basisNum" placeholder="مثلاً: 1234" onkeydown="handleBasisEnter(event)" required>
          <div class="hint-text">اساس شمېره په انګلیسي ژبه باندې ولیکئ</div>
        </div>
        <div class="input-box">
          <label for="studentCode">د زده کونکي پسورډ یا کوډ:</label>
          <input type="password" id="studentCode" placeholder="••••••" maxlength="6" onkeydown="handleCodeEnter(event)" required>
        </div>
      </div>

      <div class="btn-clear-wrapper">
        <button class="btn-clear" onclick="clearFormFields()">پاکول</button>
      </div>

      <button class="btn-search" onclick="getStudentInfo()">پلټنه او د نمراتو ښودل</button>
      
      <div id="loading">
        ❖ د معلوماتو د لټون په حال کې<span class="animated-dots"><span>.</span><span>.</span><span>.</span></span>
      </div>
    </div>

    <div id="resultPage">
      <div class="table-title">❖ د زده کونکي مشخصات او نمرات ❖</div>
      <table class="luxury-table" id="detailsTable">
      </table>
      <button class="btn-back" onclick="goBackToSearch()">له دې صفحې څخه وتل</button>
    </div>

  </div>

  <script>
    function handleBasisEnter(event) {
      if (event.key === 'Enter') {
        event.preventDefault(); 
        document.getElementById('studentCode').focus(); 
      }
    }

    function handleCodeEnter(event) {
      if (event.key === 'Enter') {
        event.preventDefault();
        getStudentInfo(); 
      }
    }

    function clearFormFields() {
      document.getElementById('basisNum').value = '';
      document.getElementById('studentCode').value = '';
      document.getElementById('error-msg').style.display = 'none';
      document.getElementById('basisNum').focus(); 
    }

    function getStudentInfo() {
      var basisNum = document.getElementById('basisNum').value.trim();
      var studentCode = document.getElementById('studentCode').value.trim();
      
      var errorMsg = document.getElementById('error-msg');
      var loading = document.getElementById('loading');
      var searchPage = document.getElementById('searchPage');
      var resultPage = document.getElementById('resultPage');
      var table = document.getElementById('detailsTable');

      errorMsg.style.display = 'none';
      table.innerHTML = '';

      if (!basisNum || !studentCode) {
        errorMsg.innerText = 'هیله کیږي چې د زده کونکي اساس شمیره او کوډ دواړه دننه کړئ.';
        errorMsg.style.display = 'block';
        return;
      }

      loading.style.display = 'block';

      // لینک وب‌اپ اختصاصی شما کاملاً بدون تغییر باقی مانده است
      var webAppUrl = "https://script.google.com/macros/s/AKfycbwfr53cS_A8nz7hEGEF5l3oc3m6dHO0ul0CIQumAMNKY4pJ1Qv19aYum0AsS3tvxB3LYw/exec";

      fetch(webAppUrl, {
        method: "POST",
        mode: "cors",
        headers: {
          "Content-Type": "text/plain;charset=utf-8"
        },
        body: JSON.stringify({
          basisNumber: basisNum,
          studentCode: studentCode
        })
      })
      .then(function(res) {
        return res.json();
      })
      .then(function(response) {
        loading.style.display = 'none'; 
        
        if (response.success) {
          searchPage.style.display = 'none';
          
          var tableHTML = '';
          response.data.forEach(function(item) {
            tableHTML += '<tr>' +
                           '<td class="td-header">' + item.header + '</td>' + 
                           '<td class="td-value">' + item.value + '</td>' +   
                         '</tr>';
          });
          table.innerHTML = tableHTML; 
          resultPage.style.display = 'block'; 
        } else {
          errorMsg.innerText = response.message;
          errorMsg.style.display = 'block';
        }
      })
      .catch(function(err) {
        loading.style.display = 'none';
        errorMsg.innerText = 'له سرور سره په اړیکه کې ستونزه رامنځته شوه. بیا هڅه وکړئ.';
        errorMsg.style.display = 'block';
        console.error(err);
      }); 
    }

    function goBackToSearch() {
      document.getElementById('resultPage').style.display = 'none'; 
      document.getElementById('basisNum').value = '';              
      document.getElementById('studentCode').value = '';            
      document.getElementById('searchPage').style.display = 'block'; 
      document.getElementById('basisNum').focus();                  
    }
  </script>

</body>
</html>
